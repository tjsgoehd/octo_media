<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>옥튜브 - 오픈채팅방 영상모음</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Pretendard', sans-serif; background-color: #f8fafc; }
        .video-card { background: white; border-radius: 16px; overflow: hidden; border: 1px solid #e2e8f0; cursor: pointer; transition: transform 0.2s; }
        .video-card:active { transform: scale(0.98); }
        .thumbnail-container { position: relative; aspect-ratio: 16/9; overflow: hidden; }
        .play-icon { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.2); }
    </style>
</head>
<body class="bg-slate-50">

    <header class="bg-white border-b border-slate-200 p-4 sticky top-0 z-50">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <h1 class="font-extrabold text-xl tracking-tighter">옥튜브</h1>
        </div>
    </header>

    <main class="max-w-5xl mx-auto p-4 grid grid-cols-2 md:grid-cols-4 gap-4" id="video-grid"></main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAjbApqAPhrZXcnR2P_xd-nvrZOvZp67CI",
            projectId: "octopath-85851",
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // [최종 해결책] 모바일 재생 오류를 완벽하게 차단하기 위한 브라우저 오픈 방식
        // 드라이브 앱으로 강제 이동하지 않고, 브라우저에서 최적화된 뷰어 모드로 열립니다.
        window.openVideo = (fileId) => {
            const url = `https://drive.google.com/file/d/${fileId}/view?usp=sharing`;
            window.open(url, '_blank', 'noopener');
        };

        function renderVideos(videos) {
            const grid = document.getElementById('video-grid');
            grid.innerHTML = videos.map(v => `
                <div class="video-card" onclick="openVideo('${v.fileId}')">
                    <div class="thumbnail-container">
                        <img src="https://lh3.googleusercontent.com/d/${v.fileId}" 
                             onerror="this.src='https://placehold.co/640x360?text=영상확인'"
                             class="w-full h-full object-cover">
                        <div class="play-icon">
                            <svg class="w-12 h-12 text-white opacity-80" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                        </div>
                    </div>
                    <div class="p-3"><h3 class="font-bold text-sm line-clamp-2">${v.title || '제목없음'}</h3></div>
                </div>
            `).join('');
        }

        onSnapshot(collection(db, 'artifacts', 'octopath-85851', 'public', 'data', 'videos'), (snap) => {
            renderVideos(snap.docs.map(d => ({ id: d.id, ...d.data() })));
        });
    </script>
</body>
</html>
