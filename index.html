<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>옥튜브 - 오픈채팅방 영상모음</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Pretendard', sans-serif; background-color: #f8fafc; }
        .video-card { background: white; border-radius: 16px; overflow: hidden; border: 1px solid #e2e8f0; cursor: pointer; }
        
        #player-modal { backdrop-filter: blur(20px); background-color: rgba(0, 0, 0, 0.95); }
        
        /* 모바일 웹뷰 최적화: 16:9 비율 고정 및 렌더링 오류 방지 */
        .video-wrapper {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
        }
        .video-wrapper iframe {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            border: 0;
        }
    </style>
</head>
<body class="bg-slate-50">

    <header class="bg-white border-b border-slate-200 p-4 sticky top-0 z-50">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <h1 class="font-extrabold text-xl tracking-tighter">옥튜브</h1>
        </div>
    </header>

    <main class="max-w-5xl mx-auto p-4 grid grid-cols-2 md:grid-cols-4 gap-4" id="video-grid"></main>

    <div id="player-modal" class="fixed inset-0 z-[100] hidden flex-col items-center justify-center p-4">
        <div class="w-full max-w-3xl" onclick="event.stopPropagation()">
            <div class="video-wrapper" id="iframe-container"></div>
            <button onclick="closePlayer()" class="mt-6 w-full py-4 bg-white/10 text-white rounded-2xl font-bold hover:bg-white/20 transition-all">닫기</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAjbApqAPhrZXcnR2P_xd-nvrZOvZp67CI",
            projectId: "octopath-85851",
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        function renderVideos(videos) {
            const grid = document.getElementById('video-grid');
            grid.innerHTML = videos.map(v => `
                <div class="video-card" onclick="openPlayer('${v.fileId}')">
                    <img src="${v.thumbnail}" class="w-full aspect-video object-cover">
                    <div class="p-3"><h3 class="font-bold text-sm line-clamp-2">${v.title}</h3></div>
                </div>
            `).join('');
        }

        // [최종 수정] 렌더링 오류 방지를 위한 구글 드라이브 비디오 뷰어 강제 호출 방식
        window.openPlayer = (fileId) => {
            const container = document.getElementById('iframe-container');
            // 'embeddedplayer' 대신 직접 뷰어 주소를 사용하여 권한 및 렌더링 오류 해결
            container.innerHTML = `
                <iframe src="https://drive.google.com/file/d/${fileId}/preview" 
                        allow="autoplay; fullscreen" 
                        frameborder="0" 
                        allowfullscreen></iframe>
            `;
            document.getElementById('player-modal').classList.remove('hidden');
            document.getElementById('player-modal').classList.add('flex');
        };

        window.closePlayer = () => {
            document.getElementById('iframe-container').innerHTML = '';
            document.getElementById('player-modal').classList.add('hidden');
            document.getElementById('player-modal').classList.remove('flex');
        };

        onSnapshot(collection(db, 'artifacts', 'octopath-85851', 'public', 'data', 'videos'), (snap) => {
            renderVideos(snap.docs.map(d => ({ id: d.id, ...d.data() })));
        });
    </script>
</body>
</html>
